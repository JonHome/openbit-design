<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenBit Design Pack</title>
    <style>
      body { margin:0; font-family: Inter, system-ui, sans-serif; color:#f8fafc; background:linear-gradient(180deg,#071022 0%,#0b1020 100%); }
      .page { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }
      .hero { padding: 28px; border-radius: 28px; background: linear-gradient(180deg, rgba(23,37,84,.92) 0%, rgba(17,24,39,.96) 100%); border:1px solid rgba(148,163,184,.16); }
      .hero h1 { margin:0; font-size: 40px; }
      .hero p { color:#cbd5e1; line-height:1.7; }
      .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; margin-top:18px; }
      .card { display:block; padding:22px; border-radius:22px; border:1px solid rgba(148,163,184,.16); background: rgba(15,23,42,.58); color:inherit; text-decoration:none; }
      .label { color:#60a5fa; font-size:12px; text-transform: uppercase; letter-spacing:.08em; }
      .card h2 { margin:8px 0 0; }
      .card p { color:#cbd5e1; line-height:1.65; }
      @media (max-width:760px) { .grid { grid-template-columns:1fr; } .hero h1 { font-size: 32px; } }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>OpenBit Design Pack / 设计评审包</h1>
        <p>Choose a locale-specific preview set. Internationalization is now handled as a first-class preview output.</p>
      </section>
      <section class="grid">
        <a class="card" href="./zh/index.html">
          <div class="label">zh-CN</div>
          <h2>简体中文</h2>
          <p>查看中文设计稿、Token 面板、组件画廊与 PDF / PNG 导出物。</p>
        </a>
        <a class="card" href="./en/index.html">
          <div class="label">en-US</div>
          <h2>English</h2>
          <p>Browse the English design pack, token board, component gallery, and exported artifacts.</p>
        </a>
      </section>
    </main>
  </body>
</html>
